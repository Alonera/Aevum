name: Build Linux

on:
  workflow_dispatch:        # manual "Run workflow" button
  push:
    tags: ['v*']            # also build + attach to a release on version tags

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install flask pystray pillow pyinstaller python-xlib

      - name: Fetch Linux yt-dlp + static ffmpeg
        run: |
          mkdir -p bin
          curl -L -o bin/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
          chmod +x bin/yt-dlp
          curl -L -o ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          mkdir -p fftmp && tar -xf ffmpeg.tar.xz -C fftmp
          cp fftmp/ffmpeg-*-static/ffmpeg bin/ffmpeg
          chmod +x bin/ffmpeg

      - name: Build AppImage + tar.gz
        run: |
          chmod +x build-linux.sh
          ./build-linux.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aevum-linux
          path: |
            Aevum-x86_64.AppImage
            Aevum-linux-x86_64.tar.gz

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Aevum-x86_64.AppImage
            Aevum-linux-x86_64.tar.gz
